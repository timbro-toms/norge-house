version: "3.9"

# Local testing — production builds, no SSL
# Usage: cp .env.example .env && docker compose -f docker-compose.local.yml up --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-norgehouse}
      POSTGRES_USER: ${POSTGRES_USER:-norgehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-norgehouse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cms:
    build:
      context: ./apps/cms
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER:-norgehouse}:${POSTGRES_PASSWORD:-localdev123}@postgres:5432/${POSTGRES_DB:-norgehouse}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-local-dev-secret-change-in-production}
      NEXT_PUBLIC_SERVER_URL: http://localhost
      PAYLOAD_PUBLIC_SITE_URL: http://localhost
    volumes:
      - cms_media:/app/media
    ports:
      - "3001:3001"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_PAYLOAD_URL: http://cms:3001
        NEXT_PUBLIC_SITE_URL: http://localhost
    restart: unless-stopped
    depends_on:
      - cms
    environment:
      NEXT_PUBLIC_PAYLOAD_URL: http://cms:3001
      NEXT_PUBLIC_SITE_URL: http://localhost
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - web
      - cms
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
      - cms_media:/var/www/media:ro

volumes:
  postgres_data:
  cms_media:
