version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-norgehouse}
      POSTGRES_USER: ${POSTGRES_USER:-norgehouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-norgehouse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cms:
    build:
      context: ./apps/cms
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URI: postgresql://${POSTGRES_USER:-norgehouse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-norgehouse}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:?Set PAYLOAD_SECRET in .env}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-https://norgehouse.com}
      PAYLOAD_PUBLIC_SITE_URL: ${PAYLOAD_PUBLIC_SITE_URL:-https://norgehouse.com}
    volumes:
      - cms_media:/app/media
    expose:
      - "3001"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_PAYLOAD_URL: ${NEXT_PUBLIC_PAYLOAD_URL:-http://cms:3001}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://norgehouse.com}
    restart: unless-stopped
    depends_on:
      - cms
    environment:
      NEXT_PUBLIC_PAYLOAD_URL: http://cms:3001
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://norgehouse.com}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@norgehouse.com}
      RESEND_TO_EMAIL: ${RESEND_TO_EMAIL:-info@norgehouse.com}
    expose:
      - "3000"

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - web
      - cms
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - cms_media:/var/www/media:ro

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  cms_media:
  certbot_certs:
  certbot_www:
